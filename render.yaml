services:
  - type: web
    name: hesap-paylas
    env: python
    # Force rebuild with timestamp - updated to trigger deployment
    buildCommand: echo "Build ID $(date +%s%N)" && pip install -r requirements.txt
    startCommand: sh start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hesap-paylas-db
          property: connectionString
      - key: RENDER_DATABASE_URL
        fromDatabase:
          name: hesap-paylas-db
          property: connectionString

  - type: postgres
    name: hesap-paylas-db
    ipWhitelist: []
    plan: free
    postgresMajorVersion: 15

