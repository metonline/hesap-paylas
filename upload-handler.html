<!DOCTYPE html>
<html>
<head>
    <title>Script.js Upload Handler</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        .container { border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #45a049; }
        #status { margin-top: 20px; padding: 10px; border-radius: 4px; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        textarea { width: 100%; height: 150px; font-family: monospace; font-size: 12px; }
        input[type="file"] { margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📁 Script.js Upload Handler</h2>
        
        <p><strong>Seçeneği seçiniz:</strong></p>
        
        <h3>Option 1: Dosya Seçerek Yükle</h3>
        <input type="file" id="fileInput" accept=".js">
        <button onclick="uploadFile()">Dosyayı Yükle</button>
        
        <h3>Option 2: İçeriği Yapıştırarak Yükle</h3>
        <textarea id="contentInput" placeholder="script.js içeriğini buraya yapıştırınız..."></textarea>
        <button onclick="uploadContent()">İçeriği Yükle</button>
        
        <div id="status"></div>
    </div>

    <script>
        function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                showStatus('Lütfen dosya seçiniz', 'error');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadToServer(e.target.result);
            };
            reader.readAsText(file);
        }
        
        function uploadContent() {
            const content = document.getElementById('contentInput').value;
            
            if (!content) {
                showStatus('Lütfen içerik yapıştırınız', 'error');
                return;
            }
            
            uploadToServer(content);
        }
        
        function uploadToServer(content) {
            showStatus('Yükleniyor... (' + content.length + ' bytes)', 'info');
            
            fetch(window.location.href, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ content: content })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showStatus('✅ BAŞARILI! script.js yüklendi (' + data.bytes + ' bytes)', 'success');
                    document.getElementById('fileInput').value = '';
                    document.getElementById('contentInput').value = '';
                } else {
                    showStatus('❌ Hata: ' + data.error, 'error');
                }
            })
            .catch(error => {
                showStatus('❌ Bağlantı hatası: ' + error.message, 'error');
            });
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = type;
            status.style.display = 'block';
        }
    </script>
</body>
</html>
